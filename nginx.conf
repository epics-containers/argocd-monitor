server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS + public fallback; variable proxy_pass defers resolution to
    # request time so nginx starts even when the upstream is unreachable.
    resolver 127.0.0.11 8.8.8.8 valid=30s;
    set $argocd_upstream "https://argocd.diamond.ac.uk";

    # Dedicated location for log streaming — must be above /api/ catch-all
    location ~ ^/api/v1/applications/[^/]+/logs {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Accept-Encoding identity;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
        add_header Content-Type text/event-stream always;
        add_header X-Accel-Buffering no always;
    }

    # Proxy ArgoCD API requests
    location /api/ {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Accept-Encoding identity;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy ArgoCD login/auth
    location /login {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    location /auth/ {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
