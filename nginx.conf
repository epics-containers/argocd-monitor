server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy ArgoCD API requests
    location /api/ {
        proxy_pass https://argocd-server.argocd.svc.cluster.local/api/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # WebSocket support for log streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streaming support
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy ArgoCD login/auth
    location /login {
        proxy_pass https://argocd-server.argocd.svc.cluster.local/login;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    location /auth/ {
        proxy_pass https://argocd-server.argocd.svc.cluster.local/auth/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
