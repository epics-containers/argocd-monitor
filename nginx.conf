map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker/system DNS; resolve at request time, not startup
    resolver 127.0.0.11 8.8.8.8 valid=30s;
    set $argocd_upstream "https://argocd.diamond.ac.uk";

    # Proxy ArgoCD API requests
    location /api/ {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # HTTP/1.1 for chunked streaming; upgrade only when client requests it
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming support
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy ArgoCD login/auth
    location /login {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    location /auth/ {
        proxy_pass $argocd_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host argocd.diamond.ac.uk;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
