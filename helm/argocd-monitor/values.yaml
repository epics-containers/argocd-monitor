# yaml-language-server: $schema=values.schema.json

image:
  # @schema description: Container image repository
  repository: ghcr.io/epics-containers/argocd-monitor
  # @schema description: Image tag (defaults to Chart.appVersion)
  tag: ""
  # @schema description: Image pull policy
  # @schema enum: [Always, IfNotPresent, Never]
  pullPolicy: IfNotPresent

# @schema description: Number of pod replicas
# @schema minimum: 1
replicaCount: 1

argocd:
  # @schema description: The ArgoCD instance URL to proxy API requests to
  url: https://argocd.diamond.ac.uk
  anonymous:
    # @schema description: Use ArgoCD anonymous read-only access. Requires users.anonymous.enabled in argocd-cm. Mutating actions will fail with 403
    enabled: false

service:
  # @schema description: Kubernetes Service type
  # @schema enum: [ClusterIP, LoadBalancer, NodePort]
  type: LoadBalancer
  # @schema description: Service port
  port: 80

ingress:
  # @schema description: Enable Ingress resource
  enabled: false
  # @schema description: Ingress class name
  className: ""
  # @schema description: Ingress annotations
  # @schema additionalProperties: {"type": "string"}
  annotations: {}
  # @schema description: Ingress hostname
  host: ""
  # @schema description: TLS configuration
  tls: []

resources:
  limits:
    # @schema description: CPU limit
    cpu: 100m
    # @schema description: Memory limit
    memory: 128Mi
  requests:
    # @schema description: CPU request
    cpu: 50m
    # @schema description: Memory request
    memory: 64Mi

# @schema description: Node selector for pod scheduling
# @schema additionalProperties: {"type": "string"}
nodeSelector: {}

# @schema description: Tolerations for pod scheduling
# @schema type: array
tolerations: []

oauth2Proxy:
  # @schema description: Enable oauth2-proxy sidecar for Keycloak OIDC authentication
  enabled: false
  image:
    # @schema description: oauth2-proxy container image repository
    repository: quay.io/oauth2-proxy/oauth2-proxy
    # @schema description: oauth2-proxy image tag
    tag: v7.7.1
    # @schema description: oauth2-proxy image pull policy
    # @schema enum: [Always, IfNotPresent, Never]
    pullPolicy: IfNotPresent
  # @schema description: OIDC client ID registered in Keycloak
  clientId: ""
  # @schema description: OIDC issuer URL (e.g. https://identity.example.com/realms/myrealm)
  issuerUrl: ""
  # @schema description: Name of existing K8s Secret with keys client-secret and cookie-secret
  existingSecret: ""
  # @schema description: Additional command-line arguments for oauth2-proxy
  # @schema type: array
  extraArgs: []
  resources:
    limits:
      # @schema description: oauth2-proxy CPU limit
      cpu: 50m
      # @schema description: oauth2-proxy memory limit
      memory: 64Mi
    requests:
      # @schema description: oauth2-proxy CPU request
      cpu: 25m
      # @schema description: oauth2-proxy memory request
      memory: 32Mi
