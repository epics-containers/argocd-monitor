apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argocd-monitor.fullname" . }}-nginx
  labels:
    {{- include "argocd-monitor.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Resolve upstream at request time so nginx starts even when unreachable
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $argocd_url "{{ .Values.argocd.url }}";

        # Dedicated location for log streaming — must be above /api/ catch-all
        location ~ ^/api/v1/applications/[^/]+/logs {
            proxy_pass $argocd_url;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_read_timeout 3600s;
            add_header Content-Type text/event-stream always;
            add_header X-Accel-Buffering no always;
        }

        location /api/ {
            proxy_pass $argocd_url;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        location /login {
            proxy_pass $argocd_url;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /auth/ {
            proxy_pass $argocd_url;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location = /healthz {
            access_log off;
            return 200 "ok";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
