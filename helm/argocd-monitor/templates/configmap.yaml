apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argocd-monitor.fullname" . }}-nginx
  labels:
    {{- include "argocd-monitor.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass {{ .Values.argocd.url }}/api/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";

            # Disable buffering and compression so chunked streams flush immediately
            proxy_buffering off;
            proxy_cache off;
            gzip off;
        }

        location /login {
            proxy_pass {{ .Values.argocd.url }}/login;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /auth/ {
            proxy_pass {{ .Values.argocd.url }}/auth/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
