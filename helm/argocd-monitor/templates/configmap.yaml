apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argocd-monitor.fullname" . }}-nginx
  labels:
    {{- include "argocd-monitor.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Auth mode endpoint — lets the frontend know whether oauth2-proxy is active
        location = /api/auth-mode {
            default_type application/json;
            {{- if .Values.oauth2Proxy.enabled }}
            return 200 '{"mode":"oauth2-proxy"}';
            {{- else }}
            return 200 '{"mode":"manual"}';
            {{- end }}
        }

        # Dedicated location for log streaming — must be above /api/ catch-all
        location ~ ^/api/v1/applications/[^/]+/logs {
            proxy_pass {{ .Values.argocd.url }};
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            {{- if .Values.oauth2Proxy.enabled }}
            proxy_set_header Authorization $http_authorization;
            {{- end }}
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_read_timeout 3600s;
            add_header Content-Type text/event-stream always;
            add_header X-Accel-Buffering no always;
        }

        location /api/ {
            proxy_pass {{ .Values.argocd.url }}/api/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            {{- if .Values.oauth2Proxy.enabled }}
            proxy_set_header Authorization $http_authorization;
            {{- end }}
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        location /login {
            proxy_pass {{ .Values.argocd.url }}/login;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /auth/ {
            proxy_pass {{ .Values.argocd.url }}/auth/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location = /healthz {
            access_log off;
            return 200 "ok";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
