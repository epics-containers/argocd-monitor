on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: If true, pushes image to container registry

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export to Docker local cache
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: tag_for_testing
          build-args: |
            VITE_APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

      - name: Test container starts and serves health check
        run: |
          docker run -d --name test_container -p 8080:8080 tag_for_testing
          sleep 2
          docker logs test_container
          curl -sf http://localhost:8080/healthz
          docker stop test_container
          docker rm test_container

      - name: Create tags for publishing image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Push cached image to container registry
        if: inputs.publish && github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ github.ref_name }}
